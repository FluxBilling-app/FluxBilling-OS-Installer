# FluxBilling generic d-i preseed (Ubuntu 18.04/20.04, Debian 11/12/13).
# Embedded in the FluxBilling image and injected into the installer initrd
# as /flux-preseed.cfg (NOT /preseed.cfg - d-i auto-loads that name from the
# initrd root, which would re-arm autoinstall in manual mode; automated mode
# passes preseed/file=/flux-preseed.cfg). Identity (hostname, passwords),
# static network and
# mirror host arrive on the kernel command line from the iPXE menu and
# override anything here (cmdline preseeding wins in d-i).

### Locales and keyboard
d-i debian-installer/locale string en_US
d-i console-setup/ask_detect boolean false
d-i keyboard-configuration/layoutcode string us
d-i keyboard-configuration/xkb-keymap select us

### Network configuration
d-i netcfg/get_domain string fluxbilling.app
d-i netcfg/domain string fluxbilling.app
d-i netcfg/wireless_wep string

### Time and clock setup
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Bucharest
d-i clock-setup/ntp boolean true

### User and password setup (passwords come from kernel cmdline)
d-i passwd/root-login boolean true
d-i passwd/user-fullname string Default User
d-i passwd/username string user
d-i user-setup/allow-password-weak boolean true

### Disk partitioning (auto, erase entire disk)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Package selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server net-tools curl wget
d-i pkgsel/upgrade select none
d-i pkgsel/update-policy select none

### Bootloader installation
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

### Finishing the installation
d-i finish-install/reboot_in_progress note

### Late commands (executed near end of install)
d-i preseed/late_command string \
    in-target sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"/GRUB_CMDLINE_LINUX_DEFAULT="quiet splash net.ifnames=0 biosdevname=0"/' /etc/default/grub; \
    in-target update-grub; \
    in-target sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target systemctl enable ssh; \
    in-target systemctl restart ssh
