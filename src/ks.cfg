# FluxBilling generic kickstart (AlmaLinux / Rocky Linux / CentOS Stream, 8/9/10).
# Embedded in the FluxBilling image and injected into the anaconda initrd as
# /flux-ks.cfg (inst.ks=file:///flux-ks.cfg; flux- prefix so nothing ever
# auto-probes it). Identity, static network and the repo base
# arrive on the kernel command line (fluxhost= fluxpass= fluxrepo= ip=) and are
# turned into kickstart commands by the %pre script below.

text
reboot
skipx
firstboot --disable
lang en_US.UTF-8
keyboard us
timezone Europe/Bucharest --utc

zerombr
clearpart --all --initlabel
autopart --type=plain --nohome

%include /tmp/flux.ks

%packages --ignoremissing
@core
openssh-server
curl
wget
%end

%pre --interpreter=/bin/sh
C=$(cat /proc/cmdline)
zget() {
    echo "$C" | tr ' ' '\n' | sed -n "s/^$1=//p" | head -n1
}
H=$(zget fluxhost); [ -n "$H" ] || H=fluxserver
P=$(zget fluxpass); [ -n "$P" ] || P=fluxbilling
R=$(zget fluxrepo)
IPCFG=$(zget ip)
IP=$(echo "$IPCFG" | cut -d: -f1)
GW=$(echo "$IPCFG" | cut -d: -f3)
NM=$(echo "$IPCFG" | cut -d: -f4)
{
    echo "rootpw --plaintext $P"
    echo "user --name=user --gecos='Default User' --password=$P --plaintext"
    if [ -n "$IP" ] && [ -n "$GW" ] && [ -n "$NM" ]; then
        echo "network --device=bootif --bootproto=static --ip=$IP --netmask=$NM --gateway=$GW --nameserver=8.8.8.8,1.1.1.1 --hostname=$H --onboot=yes"
    else
        echo "network --bootproto=dhcp --hostname=$H"
    fi
    [ -n "$R" ] && echo "repo --name=appstream --baseurl=$R/AppStream/x86_64/os/"
} > /tmp/flux.ks
%end

%post
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
systemctl enable sshd
%end
