# FluxBilling autoinstall trigger.
# Injected into the casper initrd as /conf/param.conf; casper sources this
# file after every casper-bottom script (see the "[ -e /conf/param.conf ]"
# lines in casper's ORDER), so no ORDER patching is needed and it works on
# any casper version. Runs the seed generator exactly once, as soon as the
# target root is mounted.
if [ ! -e /conf/.fluxdone ] && [ -d /root/etc ]; then
	touch /conf/.fluxdone
	sh /scripts/casper-bottom/99fluxseed
fi
